services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: samplecrm-mssql
    hostname: mssql
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SampleCRM_Sa1!"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: samplecrm-mssql-init
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "SampleCRM_Sa1!"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        /opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "IF DB_ID('SampleCRMDB') IS NULL CREATE DATABASE SampleCRMDB"
    restart: "no"

volumes:
  mssql_data:
